name: Render Backend Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          URL="${BACKEND_HEALTH_URL:-https://student-skill-tracker-backend.onrender.com/actuator/health}"
          echo "Pinging ${URL}"
          curl --silent --show-error --fail --max-time 25 "${URL}" > /dev/null

