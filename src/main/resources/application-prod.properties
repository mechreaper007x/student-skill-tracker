server.port=${PORT:8080}
# Redis is opt-in in prod: keep simple cache by default, switch to redis via SPRING_CACHE_TYPE=redis.
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.data.redis.repositories.enabled=false
spring.data.redis.host=${UPSTASH_REDIS_HOST:localhost}
spring.data.redis.port=${UPSTASH_REDIS_PORT:6379}
spring.data.redis.password=${UPSTASH_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${UPSTASH_REDIS_SSL:true}


# Database settings
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Management / Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.defaults.enabled=false
management.health.db.enabled=true
management.health.ping.enabled=true
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:false}

# Logging (Override chatty dev settings)
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.springframework.security=INFO
logging.level.com.skilltracker.student_skill_tracker=INFO

# Hikari Performance
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
