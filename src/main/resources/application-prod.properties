server.port=${PORT:8080}
# Redis / Upstash (optional in production)
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.data.redis.url=${UPSTASH_REDIS_URL:}
spring.data.redis.host=${UPSTASH_REDIS_HOST:}
spring.data.redis.port=${UPSTASH_REDIS_PORT:6379}
spring.data.redis.password=${UPSTASH_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${UPSTASH_REDIS_SSL:true}


# Database settings
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.auto-commit=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Management / Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.defaults.enabled=false
management.health.db.enabled=true
management.health.ping.enabled=true
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:false}
