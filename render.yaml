2services:
  - type: web
    name: student-skill-tracker-backend
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: DB_URL
        placeholder: "jdbc:postgresql://host:port/dbname?prepareThreshold=0"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: student-skill-tracker-frontend
    runtime: node
    plan: free
    region: ohio
    buildCommand: cd frontend && npm ci --include=dev && npm run build
    startCommand: cd frontend && npm run serve:ssr:frontend
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        fromService:
          name: student-skill-tracker-backend
          type: web
          property: host
